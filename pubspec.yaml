name: tphimx_setup
description: "DongMePhim Mobile App - Rebranded premium movie client."
publish_to: 'none'

version: 5.0.1+501

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.2
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.2.0
  intl: ^0.20.2
  path_provider: ^2.1.6
  share_plus: ^13.1.0
  permission_handler: ^12.0.3
  url_launcher: ^6.3.0
  local_notifier: ^0.1.6
  qr_flutter: ^4.1.0
  device_info_plus: any
  mobile_scanner: any
  video_player: ^2.8.2
  webview_flutter: ^4.14.0
  video_player_win: ^3.2.2
  screen_brightness: ^1.0.1
  volume_controller: ^2.0.7
  dio: ^5.4.1
  flutter_local_notifications: ^21.0.0
  package_info_plus: ^10.1.0
  crypto: ^3.0.6
  open_file: ^3.3.0
  optimize_battery: ^0.0.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/google.png
    - assets/logo_splash.gif
    - assets/dongphim_logo.png